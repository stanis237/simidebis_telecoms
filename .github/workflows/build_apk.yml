name: Build Simidebis APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
        working-directory: frontend_mobile/symberis_mobile

      - name: Build APK
        run: |
          # --no-tree-shake-icons évite les plantages fréquents en CI avec les polices d'icônes
          flutter build apk --release --no-tree-shake-icons
        working-directory: frontend_mobile/symberis_mobile

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: simidebis-release-apk
          path: frontend_mobile/symberis_mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 14
